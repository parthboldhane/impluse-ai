<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genspend Popup</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

<!-- Modal Overlay -->
<div class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-desc">
  <div class="bg-white rounded-2xl shadow-2xl p-6 w-80 max-w-full mx-4 text-center">

    <h2 id="modal-title" class="text-xl font-bold text-red-500 mb-2">
      ⚠️ Think Again
    </h2>

    <p id="modal-desc" class="text-gray-700 mb-2">
      Genspend Score: <span id="genspend-score" class="font-bold text-red-600">0%</span>
    </p>

    <p class="text-sm text-gray-600">
      This costs you <b><span id="work-hours">0</span> hours</b> of work
    </p>

    <p class="text-sm text-gray-500 mb-4">
      You viewed this for <span id="view-time">0</span> seconds
    </p>

    <div class="flex gap-2">
      <button id="wait-btn" class="bg-red-500 hover:bg-red-600 transition-colors duration-200 text-white px-4 py-2 rounded-lg w-full">
        Wait
      </button>

      <button id="proceed-btn" class="bg-green-500 hover:bg-green-600 transition-colors duration-200 text-white px-4 py-2 rounded-lg w-full">
        Proceed
      </button>
    </div>

  </div>
</div>

<script>
  // -----------------------------
  // Configuration: set your dynamic values
  // -----------------------------
  const visits = 4;          // number of visits
  const price = 100;         // cost in your currency
  const incomePerHour = 12.5; // earnings per hour

  let timeSpent = 0; // initialize view time in seconds

  // -----------------------------
  // Timer to track how long user views popup
  // -----------------------------
  const timer = setInterval(() => {
    timeSpent++;
    document.getElementById('view-time').textContent = timeSpent;
    updateGenspend(); // recalc genspend in real time if needed
  }, 1000);

  // -----------------------------
  // Function to calculate Genspend score
  // -----------------------------
  function calculateGenspend(timeSpent, visits, price, incomePerHour) {
    let score = 40;

    if (timeSpent < 30) score += 25;
    else if (timeSpent < 60) score += 15;

    if (visits > 3) score += 20;

    const hoursNeeded = price / incomePerHour;

    if (hoursNeeded > 5) score += 20;

    return {
      genspend: score > 100 ? 100 : score,
      workHours: hoursNeeded,
      viewTime: timeSpent
    };
  }

  // -----------------------------
  // Function to update HTML dynamically
  // -----------------------------
  function updateGenspend() {
    const result = calculateGenspend(timeSpent, visits, price, incomePerHour);
    document.getElementById('genspend-score').textContent = result.genspend + '%';
    document.getElementById('work-hours').textContent = result.workHours.toFixed(1);
  }

  // -----------------------------
  // Button actions
  // -----------------------------
  document.getElementById('wait-btn').addEventListener('click', () => {
    alert('You chose to wait.');
    clearInterval(timer); // stop timer if modal closes
  });

  document.getElementById('proceed-btn').addEventListener('click', () => {
    alert('You chose to proceed.');
    clearInterval(timer); // stop timer if modal closes
  });

  // Initial update on load
  updateGenspend();
</script>

</body>
</html>
